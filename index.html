<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Thiago Belém Gama</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body, html {
    height: 200vh;
}

/* FUNDO */
.hero {
    position: fixed;
    width: 100%;
    height: 100vh;
    background-image: url('THIAGOPED.png');
    background-size: cover;
    background-position: center;
    transform: scale(1.02);
    transition: transform 1s ease;
}

/* OVERLAY (CORRIGIDO - agora com gradiente integrado) */
.overlay {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: linear-gradient(
        to top,
        rgba(10,40,55,0.85) 0%,
        rgba(10,40,55,0.5) 35%,
        rgba(0,0,0,0.2) 60%,
        rgba(0,0,0,0.1) 100%
    );
    transition: 0.5s;
}

/* TEXTO */
.bottom-info {
    position: absolute;
    top: 62%;
    transform: translateY(-50%);
    width: 100%;
    text-align: center;
    color: white;
    padding: 0 20px;
}

.bottom-info h1 {
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 6px 20px rgba(0,0,0,0.7);
}

.bottom-info p {
    font-size: clamp(16px, 3vw, 20px);
    margin-top: 6px;
    opacity: 0.95;
    text-shadow: 0 4px 12px rgba(0,0,0,0.6);
}

.rqe {
    font-size: 13px;
    margin-top: 6px;
    opacity: 0.85;
}

/* INDICADOR */
.scroll-indicator {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 17px;
    font-weight: 600;
    animation: bounce 1.2s infinite;
}

.scroll-indicator span {
    display: block;
    font-size: 26px;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* CENTRALIZAÇÃO */
.content {
    position: fixed;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.98);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(50px);
    transition: 0.5s;
}

/* BOTÕES */
.btn {
    display: block;
    padding: 15px;
    margin: 12px 0;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    font-size: 15px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.btn:hover {
    transform: scale(1.02);
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

.doctoralia {
    background: #1f5f7a;
    color: white;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.maps {
    background: #4a90e2;
    color: white;
}

.doctoralia-text {
    font-size: 13px;
    color: #555;
    margin-top: 8px;
    line-height: 1.4;
}

/* AO ROLAR */
.scrolled .overlay {
    background: linear-gradient(
        to top,
        rgba(0,0,0,0.95) 0%,
        rgba(0,0,0,0.75) 40%,
        rgba(0,0,0,0.6) 70%,
        rgba(0,0,0,0.5) 100%
    );
}

.scrolled .container {
    opacity: 1;
    transform: translateY(0);
}

.scrolled .hero {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="hero"></div>
<div class="overlay"></div>

<div class="bottom-info">
    <h1>THIAGO GAMA</h1>
    <p>Infectologista Pediátrico</p>
    <div class="rqe">RQE 17103 • RQE 7390</div>
</div>

<div class="scroll-indicator">
    Deslize para ver mais
    <span>↓</span>
</div>

<div class="content">
    <div class="container">

        <a href="https://wa.me/559820167676" class="btn whatsapp" target="_blank">
            Falar no WhatsApp
        </a>

        <a href="https://maps.app.goo.gl/MapsVMzuvhph9Uv5A?g_st=ic" class="btn maps" target="_blank">

        <a href="https://www.doctoralia.com.br/thiago-belem-gama-3/infectologista-pediatrico/sao-luis?utm_source=ig&utm_medium=social&utm_content=link_in_bio&fbclid=PAZnRzaARSULtleHRuA2FlbQIxMQBzcnRjBmFwcF9pZA8xMjQwMjQ1NzQyODc0MTQAAadWV1pbTZy51H3aLqHvkdSrQRnSQ2QhvanE172qmxF6bqXJhLrJR7Mf_MFYOg_aem_3ZT5eRiJk0HMUlWf3eHilw" class="btn doctoralia" target="_blank">
            Doctoralia
        </a>

        <div class="doctoralia-text">
            Mais informações, convênios atendidos e agendamento online no Doctoralia.

</div>

<script>
window.addEventListener('scroll', function() {
    if (window.scrollY > 30) {
        document.body.classList.add('scrolled');
    } else {
        document.body.classList.remove('scrolled');
    }
});
</script>

</body>
</html>
